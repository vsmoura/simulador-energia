version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      CLARKE_DATABASE_URL: postgresql+psycopg://clarke:clarke@db:5432/clarke
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clarke
      POSTGRES_USER: clarke
      POSTGRES_PASSWORD: clarke
    ports:
      - "5432:5432"
    volumes:
      - clarke_db:/var/lib/postgresql/data

volumes:
  clarke_db:
